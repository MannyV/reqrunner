<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn AI Auto-Applier</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Req Runner</h1>
            <div class="header-actions">
                <button id="settings-btn" title="Settings">⚙️</button>
            </div>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
            <button class="tab-btn" data-tab="profile">My Data</button>
        </nav>

        <main id="main-content">
            <!-- Auth View -->
            <div id="auth-view" class="view hidden">
                <h2>Welcome</h2>
                <p>Please sign in to your ReqRunner account.</p>
                <form id="login-form">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="primary-btn">Sign In</button>
                </form>
                <p class="toggle-auth">Don't have an account? <span id="show-signup">Sign Up</span></p>
            </div>

            <!-- Dashboard View -->
            <div id="dashboard-view" class="view">
                <div class="stats">
                    <div class="stat-card">
                        <span class="label">Applied</span>
                        <span id="applied-count" class="value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Interviews</span>
                        <span id="interview-count" class="value">0</span>
                    </div>
                </div>

                <h3>Recent Applications</h3>
                <ul id="application-list">
                    <!-- Loaded dynamically -->
                </ul>
                <button id="poll-gmail" class="secondary-btn">Check Status (Gmail)</button>
            </div>

            <!-- Profile / Source of Truth View -->
            <div id="profile-view" class="view hidden">
                <div class="profile-header">
                    <h3>Source of Truth</h3>
                    <button id="save-profile" class="primary-btn-sm">Save Changes</button>
                </div>
                <div class="profile-form">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="p-first-name" placeholder="Emmanuel">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="p-last-name" placeholder="Vayleux">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="p-email" placeholder="example@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>Tagline / Summary</label>
                        <textarea id="p-tagline" placeholder="AI Product Expert with 5+ years..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Resume (Text Version)</label>
                        <textarea id="p-resume-text" placeholder="Paste your resume text here..."></textarea>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div id="auth-status">Checking auth...</div>
        </footer>
    </div>
    <script src="../../src/lib/supabase-client.js"></script>
    <script src="../../src/lib/supabase.js" type="module"></script>
    <script src="popup.js" type="module"></script>
</body>
</html>
