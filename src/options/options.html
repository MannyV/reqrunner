<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReqRunner Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ReqRunner Settings</h1>
        </header>

        <section>
            <h2>API Configuration</h2>
            <div class="form-group">
                <label for="gemini-key">Gemini API Key</label>
                <input type="password" id="gemini-key" placeholder="Enter your Gemini API key">
                <p class="help-text">Get your key from the <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.</p>
            </div>
        </section>

        <section>
            <h2>Supabase Configuration</h2>
            <div class="form-group">
                <label for="supabase-url">Supabase URL</label>
                <input type="text" id="supabase-url" placeholder="https://xyz.supabase.co">
            </div>
            <div class="form-group">
                <label for="supabase-key">Supabase Public (Anon) Key</label>
                <input type="password" id="supabase-key" placeholder="Enter your Supabase Public Key">
            </div>
        </section>

        <div class="actions">
            <button id="save-btn" class="primary-btn">Save Settings</button>
            <span id="status"></span>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
